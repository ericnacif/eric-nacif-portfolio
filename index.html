  <!-- Boot screen (pinta instantaneamente, antes do JS) -->
  <style>
    .app-boot {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      background: #f6f8fc;
      z-index: 99999;
    }
    .app-boot img { width: 92px; height: auto; }
    .app-boot .app-boot-bar {
      position: relative;
      width: 180px;
      height: 4px;
      border-radius: 999px;
      background: rgba(11, 16, 32, 0.1);
      overflow: hidden;
    }
    .app-boot .app-boot-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      border-radius: 999px;
      background: #3b5bff;
      animation: appBootSlide 1s ease-in-out infinite;
    }
    @keyframes appBootSlide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
    @media (max-width: 768px) {
      .app-boot img { width: 80px; }
      .app-boot .app-boot-bar { width: 160px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .app-boot .app-boot-bar::after { animation: none; width: 100%; }
    }
  </style>
